version: 1.5.3
agents: [claude, cursor, codex]
rfc:
  directory: oak/rfc
  template: engineering
  validate_on_create: true
constitution:
  directory: oak
languages:
  installed: [python, javascript, typescript]
skills:
  installed:
  - project-governance
  - context-engineering
  - oak
  - dependency-audit
  - pattern-finder
  - swarm
  - swarm-report
  auto_install: true
team:
  agents:
    enabled: true
    max_turns: 50
    timeout_seconds: 600
    scheduler_interval_seconds: 60
    executor_cache_size: 100
    background_processing_interval_seconds: 60
    background_processing_workers: 4
  session_quality:
    min_activities: 3
    stale_timeout_seconds: 3600
  backup:
    on_upgrade: true
  exclude_patterns:
  - .git
  - .git/**
  - .oak
  - .oak/**
  - .claude/commands
  - .claude/settings.local.json
  - .claude/skills
  - .codex/config.toml
  - .codex/prompts
  - .codex/skills
  - .cursor/commands
  - .cursor/mcp.json
  - .cursor/settings.json
  - .cursor/skills
  - .gemini/commands
  - .gemini/settings.json
  - .gemini/skills
  - .github/agents
  - .github/skills
  - .mcp.json
  - .opencode/commands
  - .opencode/skills
  - .vscode/mcp.json
  - .vscode/settings.json
  - .windsurf/commands
  - .windsurf/settings.json
  - .windsurf/skills
  - opencode.json
  - .claude/settings.json
  - .cursor/hooks.json
  - .cursor/hooks
  - .cursor/hooks/**
  - node_modules
  - node_modules/**
  - '**/node_modules'
  - '**/node_modules/**'
  - __pycache__
  - __pycache__/**
  - .mypy_cache
  - .mypy_cache/**
  - .pytest_cache
  - .pytest_cache/**
  - .ruff_cache
  - .ruff_cache/**
  - htmlcov
  - htmlcov/**
  - .venv
  - .venv/**
  - venv
  - venv/**
  - .env
  - .env.*
  - '*.env'
  - '*.pem'
  - '*.key'
  - '*.crt'
  - '*.p12'
  - '*.pfx'
  - '*.jks'
  - '*.keystore'
  - '*.pyc'
  - '*.pyo'
  - '*.min.js'
  - '*.min.css'
  - '*.map'
  - '*.lock'
  - package-lock.json
  - yarn.lock
  - pnpm-lock.yaml
  - dist/**
  - build/**
  - .next/**
  - coverage/**
  - '*.egg-info/**'
  - translations/**
  - locales/**
  - locale/**
  - i18n/**
  - l10n/**
  - '*.po'
  - '*.pot'
  - '*.mo'
  cli_command: oak
  auto_resolve:
    enabled: true
    similarity_threshold: 0.85
    similarity_threshold_no_context: 0.92
    search_limit: 5
  team:
    sync_interval_seconds: 3
    project_slug: null
    relay_worker_url: https://oak-relay-unifi-network-mcp.goondocks.co
    relay_worker_name: null
  cloud_relay:
    worker_url: https://oak-relay-unifi-network-mcp.goondocks.co
    worker_name: oak-relay-unifi-network-mcp
    auto_connect: true
    tool_timeout_seconds: 30
    reconnect_max_seconds: 60
    custom_domain: goondocks.co
    deployed_template_hash: f6d02dd89708f72a332084633d282a1afbf15696af2c3b518035f35cbc175fe2
